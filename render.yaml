services:
  - type: web
    name: discord-voice-server
    env: node
    branch: main
    plan: free
    # Some build environments (including Render) require a lockfile for `npm ci`.
    # Use `npm install` here to avoid failing when package-lock.json is absent.
    buildCommand: "cd server && npm install"
    startCommand: "cd server && npm start"
    envVars:
      - key: JWT_SECRET
      - key: INVITE_TOKEN_SECRET
